version: 2
updates:
  # npm dependencies for the Angular workspace.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Keep the Angular toolchain bumping together to avoid version skew.
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "ng-packagr"

  # Keep the GitHub Actions used in workflows up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
