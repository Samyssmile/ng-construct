name: ✨ Feature Request
description: Suggest a new component, input/output, or improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the component or API (inputs/outputs) you'd like.
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New component
        - New input / output on existing component
        - Accessibility improvement
        - Forms / ControlValueAccessor
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
    validations:
      required: false
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this
