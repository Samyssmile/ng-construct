name: 🐛 Bug Report
description: Report a problem with an ng-construct component
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the sections below.
  - type: input
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      placeholder: e.g. af-datepicker, af-data-table
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: A minimal reproduction (StackBlitz link strongly preferred).
      placeholder: |
        1. Add '<af-... />'
        2. Set input '...'
        3. See '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. Actual
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: ng-construct, construct, and Angular versions.
      placeholder: "ng-construct 0.11.1 · construct 2.0.4 · Angular 21.2"
    validations:
      required: true
  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - light
        - dark
        - high-contrast
        - all themes
    validations:
      required: false
  - type: checkboxes
    id: a11y
    attributes:
      label: Accessibility
      options:
        - label: This bug affects accessibility (keyboard, screen reader, contrast)
